<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Assignment Level 3</title>
</head>
<body>
    <h2>Feedback Form</h2>
    <form action="/server">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Write your name">
        </div>
        <br>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Write your email">
        </div>
        <br>
        <div>
            <label for="message">Message:</label>
            <br>
            <textarea id="message" cols="30" rows="5"></textarea>
        </div>
        <br>
        <div>
            <label for="rating">Rate us our of 5:</label>
            <br>
            <input type="radio" name="rating" id="1"/>
            <label for="1">1</label>
            <br>
            <input type="radio" name="rating" id="2"/>
            <label for="2">2</label>
            <br>
            <input type="radio" name="rating" id="3"/>
            <label for="3">3</label>
            <br>
            <input type="radio" name="rating" id="4"/>
            <label for="4">4</label>
            <br>
            <input type="radio" name="rating" id="5"/>
            <label for="5">5</label>
        
        </div>
        <br>
        <div>
            <button>Send you message!</button>
        </div>
    </form>
</body>
</html>
